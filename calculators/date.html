        <section class="tool-section">
          <div class="section-heading"><div><p class="eyebrow">Calculator</p><h1>날짜 계산기</h1><p>날짜 차이, D-Day, 날짜 더하기와 빼기를 서버 없이 계산합니다.</p></div></div>
          <div class="calc-grid">
            <form class="calc-panel calc-form" id="dateCalcForm">
              <div class="form-row"><label for="dateStart">시작일</label><input id="dateStart" type="date"></div>
              <div class="form-row"><label for="dateEnd">종료일 / 목표일</label><input id="dateEnd" type="date"></div>
              <div class="form-row"><label><input id="includeEnd" type="checkbox"> 종료일 포함 계산</label></div>
              <div class="form-row"><label for="dateBase">더하기·빼기 기준일</label><input id="dateBase" type="date"></div>
              <div class="form-row"><label for="dateMode">계산 방향</label><select id="dateMode"><option value="add">더하기</option><option value="subtract">빼기</option></select></div>
              <div class="inline-fields">
                <div class="form-row"><label for="dateYears">년</label><input id="dateYears" type="number" value="0" min="0"></div>
                <div class="form-row"><label for="dateMonths">월</label><input id="dateMonths" type="number" value="0" min="0"></div>
                <div class="form-row"><label for="dateDays">일</label><input id="dateDays" type="number" value="30" min="0"></div>
              </div>
            </form>
            <div class="result-panel" id="dateCalcResult" aria-live="polite"></div>
          </div>
